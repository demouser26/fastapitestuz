<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udar Ob-havo | Obhavo.uz API</title>
    <!-- Fredoka Shrifti -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Ikonkalar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #fff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .weather-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .weather-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.1);
        }
        .loader {
            border-top-color: #38bdf8;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <!-- Qidiruv Bo'limi -->
        <div class="glass p-6 mb-10 flex flex-col md:flex-row gap-6 items-center">
            <h1 class="text-3xl font-bold tracking-tight mb-4 md:mb-0">
                <span class="gradient-text">🌦️ Udar Ob-havo</span>
            </h1>
            <div class="relative flex-grow w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/40">
                    <i class="fas fa-search"></i>
                </div>
                <input type="text" id="cityInput" placeholder="Shaharni kiriting (navoi, samarkand, bukhara)..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-white focus:ring-2 focus:ring-sky-500/50 outline-none text-lg transition-all">
                <button onclick="getWeather()" class="absolute right-2 top-2 bottom-2 bg-sky-500 text-white px-8 rounded-xl font-bold hover:bg-sky-400 active:scale-95 transition-all shadow-lg shadow-sky-500/20">
                    Izlash
                </button>
            </div>
        </div>

        <!-- Yuklanish indikatori -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-white/10 h-16 w-16 mb-4"></div>
            <p class="text-sky-400 font-medium animate-pulse">Ma'lumotlar yuklanmoqda...</p>
        </div>

        <!-- Natijalar -->
        <div id="weatherContent" class="hidden space-y-10">
            <!-- Asosiy bugungi ob-havo -->
            <div class="glass p-10 grid md:grid-cols-2 gap-10 items-center relative overflow-hidden">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-sky-500/10 rounded-full blur-3xl"></div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fas fa-location-dot text-sky-400"></i>
                        <h2 id="cityName" class="text-5xl font-bold">--</h2>
                    </div>
                    <p id="dateStr" class="text-xl text-white/60 mb-8 font-light">--</p>
                    <div class="flex items-center gap-6">
                        <span id="mainTemp" class="text-8xl font-bold text-white tracking-tighter">--</span>
                        <div class="border-l border-white/10 pl-6">
                            <p id="nightTemp" class="text-2xl text-white/50 mb-1">--</p>
                            <p id="weatherDesc" class="text-2xl font-semibold text-sky-300">--</p>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 relative z-10">
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <i class="fas fa-droplet mb-3 text-sky-400 text-xl"></i>
                        <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Namlik</p>
                        <p id="humidity" class="text-2xl font-bold">--</p>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <i class="fas fa-wind mb-3 text-emerald-400 text-xl"></i>
                        <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Shamol</p>
                        <p id="wind" class="text-2xl font-bold">--</p>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <i class="fas fa-sun mb-3 text-amber-400 text-xl"></i>
                        <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Quyosh</p>
                        <p id="sunrise" class="text-2xl font-bold">--</p>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <i class="fas fa-moon mb-3 text-indigo-400 text-xl"></i>
                        <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Oy</p>
                        <p id="moon" class="text-2xl font-bold">--</p>
                    </div>
                </div>
            </div>

            <!-- Haftalik -->
            <div>
                <h3 class="text-2xl font-bold px-2 mb-6 flex items-center gap-3">
                    <i class="fas fa-calendar-days text-sky-400"></i>
                    Haftalik Bashorat
                </h3>
                <div id="weeklyContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                    <!-- JS orqali to'ldiriladi -->
                </div>
            </div>
        </div>

        <!-- Xatolik Xabari -->
        <div id="errorMessage" class="hidden glass p-10 text-center border-red-500/30">
            <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-circle-exclamation text-4xl text-red-500"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">Voy, xatolik!</h3>
            <p id="errorText" class="text-white/60 text-lg">Ma'lumotlarni yuklab bo'lmadi.</p>
            <button onclick="getWeather()" class="mt-6 px-6 py-2 bg-white/10 rounded-xl hover:bg-white/20 transition-all">
                Qayta urunish
            </button>
        </div>
    </div>

    <script>
        async function getWeather() {
            const cityInput = document.getElementById('cityInput');
            const city = cityInput.value.trim() || 'tashkent';
            const content = document.getElementById('weatherContent');
            const loader = document.getElementById('loading');
            const error = document.getElementById('errorMessage');

            // UI ni tozalash va tayyorlash
            content.classList.add('hidden');
            error.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`/api/weather/${city}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Shahar topilmadi yoki tizimda xatolik.');
                }

                const data = await response.json();

                // Asosiy ma'lumotlarni xavfsiz joylash
                document.getElementById('cityName').innerText = data.shahar || 'Nomaʼlum';
                document.getElementById('dateStr').innerText = data.sana || 'Bugun';
                document.getElementById('mainTemp').innerText = data.bugungi_obhavo.harorat_kunduzi || '--';
                document.getElementById('nightTemp').innerText = data.bugungi_obhavo.harorat_kechasi ? 'Kechasi: ' + data.bugungi_obhavo.harorat_kechasi : '--';
                document.getElementById('weatherDesc').innerText = data.bugungi_obhavo.tavsif || 'Maʼlumot yoʻq';
                document.getElementById('humidity').innerText = data.bugungi_obhavo.namlik || '--';
                document.getElementById('wind').innerText = data.bugungi_obhavo.shamol || '--';
                document.getElementById('sunrise').innerText = data.bugungi_obhavo.quyosh_chiqishi || '--';
                document.getElementById('moon').innerText = data.bugungi_obhavo.oy || '--';

                // Haftalik container
                const weeklyContainer = document.getElementById('weeklyContainer');
                weeklyContainer.innerHTML = '';
                
                if (data.haftalik_obhavo && data.haftalik_obhavo.length > 0) {
                    data.haftalik_obhavo.forEach(day => {
                        const dateParts = day.sana ? day.sana.split(' ') : ['Kun', '---'];
                        const dayName = dateParts[0];
                        const dateOnly = dateParts.slice(1).join(' ');

                        const card = `
                            <div class="glass p-5 text-center weather-card border border-white/5 shadow-xl">
                                <p class="font-bold text-sky-400 mb-1">${dayName}</p>
                                <p class="text-[10px] uppercase tracking-wider opacity-40 mb-4">${dateOnly}</p>
                                <div class="text-3xl font-bold mb-1">${day.harorat_kunduzi || '--'}</div>
                                <div class="text-sm opacity-40 mb-4">${day.harorat_kechasi || '--'}</div>
                                <div class="h-12 flex items-center justify-center">
                                    <p class="text-[11px] leading-tight font-medium opacity-80 italic">${day.tavsif || ''}</p>
                                </div>
                                ${day.yogingarchilik ? `<p class="mt-2 text-[10px] text-blue-400 font-bold"><i class="fas fa-droplet mr-1"></i>${day.yogingarchilik}</p>` : ''}
                            </div>
                        `;
                        weeklyContainer.innerHTML += card;
                    });
                } else {
                    weeklyContainer.innerHTML = '<p class="col-span-full text-center opacity-40 py-10">Haftalik maʼlumot mavjud emas.</p>';
                }

                content.classList.remove('hidden');
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('errorText').innerText = err.message;
                error.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Enter bosilganda qidirish
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });

        // Sayt yuklanganda avtomatik Toshkentni chiqarish
        window.onload = () => {
            getWeather();
        };
    </script>
</body>
</html>
